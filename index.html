<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>אליאס — מנחה</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Heebo', Arial, sans-serif; background: #e31e24; color: #fff; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 16px; }
.container { width: 100%; max-width: 480px; }
.screen { display: none; }
.screen.active { display: block; }

.setup-logo { text-align: center; padding: 28px 0 22px; }
.setup-logo h1 { font-size: 72px; font-weight: 900; letter-spacing: 4px; color: #fff; text-shadow: 3px 3px 0 rgba(0,0,0,0.25); }
.setup-logo p { color: rgba(255,255,255,0.75); font-size: 15px; margin-top: 4px; }

.section-card { background: rgba(0,0,0,0.18); border-radius: 16px; padding: 18px 20px; margin-bottom: 14px; border: 1px solid rgba(255,255,255,0.2); }
.section-title { font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.7); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 12px; }
label { font-size: 13px; color: rgba(255,255,255,0.7); display: block; margin-bottom: 5px; }
input[type=text], input[type=number], textarea, select { width: 100%; padding: 10px 12px; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.3); border-radius: 10px; color: #fff; font-size: 14px; font-family: 'Heebo', Arial, sans-serif; margin-bottom: 4px; }
input::placeholder, textarea::placeholder { color: rgba(255,255,255,0.4); }
select option { background: #c0392b; color: #fff; }
textarea { height: 120px; resize: vertical; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

.team-count-row { display: flex; gap: 8px; margin-bottom: 14px; }
.tc-btn { flex: 1; padding: 10px; background: rgba(0,0,0,0.2); border: 2px solid rgba(255,255,255,0.25); border-radius: 10px; color: rgba(255,255,255,0.7); font-size: 18px; font-weight: 900; font-family: 'Heebo', Arial, sans-serif; cursor: pointer; text-align: center; }
.tc-btn.active { background: #fff; border-color: #fff; color: #e31e24; }
.team-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.team-input-wrap label { font-size: 12px; }

.participants-input-row { display: flex; gap: 8px; margin-bottom: 10px; }
.participants-input-row input { margin-bottom: 0; flex: 1; }
.add-btn { padding: 10px 16px; background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4); border-radius: 10px; color: #fff; font-size: 20px; font-weight: 700; cursor: pointer; font-family: 'Heebo', Arial, sans-serif; }
.participants-list { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; min-height: 36px; }
.participant-chip { display: flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.2); border-radius: 20px; padding: 5px 12px; font-size: 14px; font-weight: 700; }
.chip-remove { background: none; border: none; color: rgba(255,255,255,0.7); font-size: 16px; cursor: pointer; padding: 0; }
.shuffle-btn { width: 100%; padding: 10px; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); border-radius: 10px; color: #fff; font-size: 14px; font-weight: 700; cursor: pointer; font-family: 'Heebo', Arial, sans-serif; }
.teams-reveal { margin-top: 12px; }
.team-reveal-row { background: rgba(255,255,255,0.12); border-radius: 10px; padding: 10px 14px; margin-bottom: 8px; }
.team-reveal-name { font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.6); margin-bottom: 4px; text-transform: uppercase; }
.team-reveal-members { display: flex; flex-wrap: wrap; gap: 6px; }
.team-member-chip { background: rgba(255,255,255,0.2); border-radius: 20px; padding: 3px 10px; font-size: 13px; font-weight: 700; }

/* room bar */
.room-bar { display: none; background: rgba(0,0,0,0.28); border-radius: 16px; padding: 16px 18px; margin-bottom: 14px; border: 2px dashed rgba(255,255,255,0.35); }
.room-bar.visible { display: block; }
.room-bar-title { font-size: 11px; color: rgba(255,255,255,0.55); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
.room-bar-inner { display: flex; gap: 16px; align-items: center; }
.room-qr { width: 100px; height: 100px; border-radius: 10px; flex-shrink: 0; background: #fff; }
.room-bar-right { flex: 1; }
.room-bar-link { font-size: 11px; color: rgba(255,255,255,0.45); word-break: break-all; margin-bottom: 10px; line-height: 1.5; }
.copy-btn { display: block; width: 100%; padding: 10px; background: #fff; color: #e31e24; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: 'Heebo', Arial, sans-serif; text-align: center; }

.btn { display: block; width: 100%; padding: 16px; border: none; border-radius: 14px; font-size: 17px; font-weight: 700; font-family: 'Heebo', Arial, sans-serif; cursor: pointer; text-align: center; margin-bottom: 10px; transition: transform 0.1s; }
.btn:active { transform: scale(0.97); }
.btn-white   { background: #fff; color: #e31e24; }
.btn-correct { background: #fff; color: #27ae60; flex: 1; font-size: 16px; font-weight: 900; }
.btn-skip    { background: rgba(0,0,0,0.25); color: #fff; flex: 1; font-size: 16px; font-weight: 700; border: 1px solid rgba(255,255,255,0.3); }

.scoreboard { background: rgba(0,0,0,0.18); border-radius: 16px; padding: 16px; margin-bottom: 14px; border: 1px solid rgba(255,255,255,0.2); display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
.score-col { text-align: center; min-width: 80px; flex: 1; }
.score-name { font-size: 12px; color: rgba(255,255,255,0.7); font-weight: 700; margin-bottom: 2px; }
.score-members { font-size: 11px; color: rgba(255,255,255,0.45); margin-bottom: 2px; }
.score-val  { font-size: 44px; font-weight: 900; color: #fff; line-height: 1; }
.score-col.active-team .score-val  { color: #ffe066; }
.score-col.active-team .score-name { color: #ffe066; }

.turn-banner { text-align: center; padding: 24px 20px; background: rgba(0,0,0,0.18); border-radius: 20px; margin-bottom: 16px; border: 1px solid rgba(255,255,255,0.2); }
.turn-label { font-size: 13px; font-weight: 700; letter-spacing: 2px; color: rgba(255,255,255,0.7); text-transform: uppercase; margin-bottom: 6px; }
.turn-team  { font-size: 38px; font-weight: 900; color: #fff; }
.turn-members { font-size: 14px; color: rgba(255,255,255,0.6); margin-top: 4px; }
.turn-hint  { text-align: center; font-size: 14px; color: rgba(255,255,255,0.7); margin-bottom: 16px; }

.timer-wrap { text-align: center; margin-bottom: 8px; }
.timer-num  { font-size: 108px; font-weight: 900; color: #fff; line-height: 1; }
.timer-num.low { animation: blink 0.5s infinite alternate; }
@keyframes blink{from{opacity:1}to{opacity:0.5}}
.timer-bar-bg { background: rgba(0,0,0,0.2); border-radius: 6px; height: 6px; margin-bottom: 16px; }
.timer-bar    { height: 6px; border-radius: 6px; background: #fff; transition: width 0.9s linear; }
.timer-bar.low { background: rgba(255,255,255,0.5); }

.word-card { background: #fff; border-radius: 20px; padding: 40px 24px; text-align: center; margin-bottom: 16px; box-shadow: 0 6px 24px rgba(0,0,0,0.2); }
.word-text  { font-size: 50px; font-weight: 900; color: #e31e24; line-height: 1.2; }
.word-count { font-size: 12px; color: #aaa; margin-top: 10px; }

.action-row { display: flex; gap: 10px; margin-bottom: 14px; }
.action-row .btn { margin-bottom: 0; padding: 18px 12px; }

.log-wrap { max-height: 150px; overflow-y: auto; }
.log-item { display: flex; justify-content: space-between; align-items: center; padding: 7px 12px; border-radius: 8px; margin-bottom: 4px; font-size: 14px; }
.log-item.correct { background: rgba(255,255,255,0.15); }
.log-item.skip    { background: rgba(0,0,0,0.15); }
.log-tag { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 20px; }
.log-item.correct .log-tag { background: #fff; color: #27ae60; }
.log-item.skip    .log-tag { background: rgba(0,0,0,0.3); color: rgba(255,255,255,0.8); }

.summary-card { background: rgba(0,0,0,0.18); border-radius: 16px; padding: 20px; margin-bottom: 14px; border: 1px solid rgba(255,255,255,0.2); }
.summary-pts { font-size: 48px; font-weight: 900; color: #fff; }
.summary-sub { font-size: 14px; color: rgba(255,255,255,0.7); margin-bottom: 14px; margin-top: 2px; }
.summary-list { max-height: 180px; overflow-y: auto; }
.summary-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.12); font-size: 14px; color: rgba(255,255,255,0.9); }

.end-wrap { text-align: center; padding: 30px 0 20px; }
.trophy { font-size: 80px; margin-bottom: 12px; }
.winner-name { font-size: 40px; font-weight: 900; color: #fff; }
.winner-sub  { font-size: 15px; color: rgba(255,255,255,0.7); margin-top: 6px; margin-bottom: 24px; }
.end-scores { background: rgba(0,0,0,0.18); border-radius: 16px; padding: 16px; margin-bottom: 14px; border: 1px solid rgba(255,255,255,0.2); }
.end-score-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 4px; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 16px; }
.end-score-row:last-child { border-bottom: none; }
.end-score-row.winner { color: #ffe066; font-weight: 900; font-size: 18px; }
.end-members { font-size: 12px; color: rgba(255,255,255,0.5); }
</style>
</head>
<body>

<div class="room-bar" id="room-bar">
  <div class="room-bar-title">📲 שתף עם השחקנים</div>
  <div class="room-bar-inner">
    <img class="room-qr" id="room-qr" src="" alt="QR" />
    <div class="room-bar-right">
      <div class="room-bar-link" id="room-bar-link"></div>
      <button class="copy-btn" onclick="copyLink()" id="copy-btn">העתק קישור</button>
    </div>
  </div>
</div>

<div class="container">

<div id="screen-setup" class="screen active">
  <div class="setup-logo"><h1>אליאס</h1><p>ממשק מנחה</p></div>

  <div class="section-card">
    <div class="section-title">מילות המשחק</div>
    <textarea id="words-input" placeholder="הדבק מילים כאן — שורה אחת לכל מילה&#10;מחשב&#10;ירח&#10;ארנב&#10;..."></textarea>
  </div>

  <div class="section-card">
    <div class="section-title">מספר קבוצות</div>
    <div class="team-count-row">
      <button class="tc-btn" onclick="setTeamCount(2)">2</button>
      <button class="tc-btn active" onclick="setTeamCount(3)">3</button>
      <button class="tc-btn" onclick="setTeamCount(4)">4</button>
      <button class="tc-btn" onclick="setTeamCount(5)">5</button>
      <button class="tc-btn" onclick="setTeamCount(6)">6</button>
    </div>
    <div class="section-title">שמות קבוצות</div>
    <div class="team-inputs" id="team-inputs"></div>
  </div>

  <div class="section-card">
    <div class="section-title">משתתפים (אופציונלי)</div>
    <div class="participants-input-row">
      <input type="text" id="participant-input" placeholder="שם אחד, או הדבק רשימה..." onkeydown="if(event.key==='Enter') addParticipant()" onpaste="handlePaste(event)" />
      <button class="add-btn" onclick="addParticipant()">+</button>
    </div>
    <div class="participants-list" id="participants-list"></div>
    <button class="shuffle-btn" onclick="shuffleParticipants()" id="shuffle-btn" style="display:none">🔀 חלק רנדומלית לקבוצות</button>
    <div class="teams-reveal" id="teams-reveal"></div>
  </div>

  <div class="section-card">
    <div class="section-title">הגדרות</div>
    <div class="grid2">
      <div><label>זמן לסיבוב (שניות)</label><input type="number" id="round-time" value="60" min="15" max="180" /></div>
      <div><label>עונש על דילוג</label>
        <select id="skip-penalty">
          <option value="-1">-1 נקודה</option>
          <option value="0" selected>ללא עונש</option>
        </select>
      </div>
    </div>
  </div>

  <button class="btn btn-white" id="start-btn" onclick="initGame()">▶ התחל משחק</button>
</div>

<div id="screen-turn-start" class="screen">
  <div class="turn-banner">
    <div class="turn-label">תור</div>
    <div class="turn-team" id="turn-team-name">—</div>
    <div class="turn-members" id="turn-members"></div>
  </div>
  <div class="scoreboard" id="sb-turnstart"></div>
  <p class="turn-hint">המסביר מסביר — המנחש מנחש!</p>
  <button class="btn btn-white" onclick="startRound()">🚀 התחל סיבוב!</button>
</div>

<div id="screen-playing" class="screen">
  <div class="timer-wrap"><div class="timer-num" id="timer-display">60</div></div>
  <div class="timer-bar-bg"><div class="timer-bar" id="timer-bar" style="width:100%"></div></div>
  <div class="word-card">
    <div class="word-text" id="current-word">—</div>
    <div class="word-count" id="words-left-count"></div>
  </div>
  <div class="action-row">
    <button class="btn btn-correct" onclick="markCorrect()">✓ ניחשו!</button>
    <button class="btn btn-skip" onclick="skipWord()">⟶ דלג</button>
  </div>
  <div class="log-wrap" id="round-log"></div>
</div>

<div id="screen-turn-end" class="screen">
  <div class="summary-card">
    <div class="summary-pts" id="turn-pts">+0 נקודות</div>
    <div class="summary-sub" id="turn-sub"></div>
    <div class="summary-list" id="turn-list"></div>
  </div>
  <div class="scoreboard" id="sb-turnend"></div>
  <button class="btn btn-white" id="next-turn-btn" onclick="nextTurn()">תור הבא ▶</button>
</div>

<div id="screen-end" class="screen">
  <div class="end-wrap">
    <div class="trophy">🏆</div>
    <div class="winner-name" id="winner-name"></div>
    <div class="winner-sub"  id="winner-sub"></div>
  </div>
  <div class="end-scores" id="end-scores"></div>
  <button class="btn btn-white" onclick="resetGame()">▶ משחק חדש</button>
</div>

</div>
<script>
var BLOB_API = 'https://jsonblob.com/api/jsonBlob';
var selectedTeamCount = 3;
var participants = [];
var assignedTeamMembers = [];
var blobId = null;
var playersUrl = '';

var state = {
  words:[], used:[], scores:[], teams:[], teamMembers:[],
  currentTeam:0, roundTime:60, skipPenalty:0,
  timer:null, timeLeft:60, totalTime:60,
  roundCorrect:[], roundSkipped:[], currentWord:null
};

function initGame() {
  var raw = document.getElementById('words-input').value.trim();
  var words = raw.split('\n').map(function(w){ return w.trim(); }).filter(function(w){ return w.length > 0; });
  if (words.length < 5) { alert('נדרשות לפחות 5 מילים!'); return; }

  var btn = document.getElementById('start-btn');
  btn.disabled = true; btn.textContent = '⏳ יוצר חדר משחק...';

  fetch(BLOB_API, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
    body: JSON.stringify({ phase: 'waiting' })
  }).then(function(res) {
    var loc = res.headers.get('Location') || '';
    blobId = loc.split('/').pop();
    if (!blobId) throw new Error('לא התקבל מזהה חדר');
    playersUrl = 'https://eladperel.github.io/elias/players.html?room=' + blobId;
    showRoomBar();
    btn.disabled = false; btn.textContent = '▶ התחל משחק';
    startGame(words);
  }).catch(function(e) {
    btn.disabled = false; btn.textContent = '▶ התחל משחק';
    alert('שגיאה ביצירת חדר: ' + e.message);
  });
}

function showRoomBar() {
  document.getElementById('room-bar-link').textContent = playersUrl;
  document.getElementById('room-qr').src = 'https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=' + encodeURIComponent(playersUrl);
  document.getElementById('room-bar').classList.add('visible');
}

function copyLink() {
  navigator.clipboard.writeText(playersUrl).catch(function(){});
  var btn = document.getElementById('copy-btn');
  btn.textContent = '✓ הועתק!';
  setTimeout(function(){ btn.textContent = 'העתק קישור'; }, 2000);
}

function broadcast(phase) {
  if (!blobId) return;
  var pub = {
    phase: phase, teams: state.teams, teamMembers: state.teamMembers,
    scores: state.scores, currentTeam: state.currentTeam,
    timeLeft: state.timeLeft, totalTime: state.totalTime,
    correctCount: state.roundCorrect.length, skipCount: state.roundSkipped.length,
    wordsLeft: state.words.filter(function(w){ return state.used.indexOf(w) === -1; }).length,
    roundCorrectWords: phase === 'turn-end' ? state.roundCorrect : [],
    roundSkippedWords: phase === 'turn-end' ? state.roundSkipped : [],
    winner: null, winnerSub: null
  };
  if (phase === 'end') {
    var mx = Math.max.apply(null, state.scores);
    var ws = state.teams.filter(function(t, i){ return state.scores[i] === mx; });
    pub.winner = ws.length === 1 ? ws[0] + ' ניצחו!' : 'תיקו!';
    pub.winnerSub = mx + ' נקודות';
  }
  fetch(BLOB_API + '/' + blobId, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
    body: JSON.stringify(pub)
  });
}

/* ── setup helpers ── */
function setTeamCount(n) {
  selectedTeamCount = n;
  document.querySelectorAll('.tc-btn').forEach(function(b,i){ b.classList.toggle('active',(i+2)===n); });
  renderTeamInputs(n);
  if (participants.length > 0) shuffleParticipants(); else document.getElementById('teams-reveal').innerHTML = '';
}
function renderTeamInputs(n) {
  var c = document.getElementById('team-inputs'), ex = [];
  c.querySelectorAll('input').forEach(function(inp){ ex.push(inp.value); });
  c.innerHTML = '';
  for (var i = 0; i < n; i++) {
    var w = document.createElement('div'); w.className = 'team-input-wrap';
    var l = document.createElement('label'); l.textContent = 'קבוצה ' + (i+1);
    var inp = document.createElement('input'); inp.type = 'text'; inp.id = 'team-name-' + i;
    inp.value = ex[i] || ('קבוצה ' + (i+1));
    inp.onchange = function(){ if (participants.length > 0) renderTeamsReveal(); };
    w.appendChild(l); w.appendChild(inp); c.appendChild(w);
  }
}
function handlePaste(e) {
  var text = (e.clipboardData || window.clipboardData).getData('text');
  var names = text.split(/[\n,،;]+/).map(function(n){ return n.trim(); }).filter(function(n){ return n.length > 0; });
  if (names.length <= 1) return;
  e.preventDefault();
  names.forEach(function(name){ if (participants.indexOf(name) === -1) participants.push(name); });
  document.getElementById('participant-input').value = '';
  renderParticipants();
}
function addParticipant() {
  var inp = document.getElementById('participant-input'), name = inp.value.trim();
  if (!name) return;
  participants.push(name); inp.value = ''; inp.focus(); renderParticipants();
}
function removeParticipant(i) {
  participants.splice(i, 1); renderParticipants();
  if (participants.length > 0) shuffleParticipants(); else document.getElementById('teams-reveal').innerHTML = '';
}
function renderParticipants() {
  var list = document.getElementById('participants-list'); list.innerHTML = '';
  participants.forEach(function(name, i) {
    var chip = document.createElement('div'); chip.className = 'participant-chip';
    chip.innerHTML = name + '<button class="chip-remove" onclick="removeParticipant(' + i + ')">×</button>';
    list.appendChild(chip);
  });
  document.getElementById('shuffle-btn').style.display = participants.length >= selectedTeamCount ? 'block' : 'none';
  if (participants.length >= selectedTeamCount) shuffleParticipants();
}
function shuffleParticipants() {
  var arr = participants.slice();
  for (var i = arr.length-1; i > 0; i--) { var j = Math.floor(Math.random()*(i+1)), t = arr[i]; arr[i] = arr[j]; arr[j] = t; }
  assignedTeamMembers = [];
  for (var k = 0; k < selectedTeamCount; k++) assignedTeamMembers.push([]);
  arr.forEach(function(name, idx){ assignedTeamMembers[idx % selectedTeamCount].push(name); });
  renderTeamsReveal();
}
function getTeamName(i){ var el = document.getElementById('team-name-' + i); return el ? el.value || ('קבוצה '+(i+1)) : 'קבוצה '+(i+1); }
function renderTeamsReveal() {
  var c = document.getElementById('teams-reveal'); if (!assignedTeamMembers.length) { c.innerHTML = ''; return; }
  var html = '';
  for (var i = 0; i < selectedTeamCount; i++) {
    var m = assignedTeamMembers[i] || [];
    html += '<div class="team-reveal-row"><div class="team-reveal-name">' + getTeamName(i) + '</div><div class="team-reveal-members">' + m.map(function(x){ return '<span class="team-member-chip">'+x+'</span>'; }).join('') + '</div></div>';
  }
  c.innerHTML = html;
}
function renderScoreboard(cid, activeTeam) {
  var el = document.getElementById(cid); el.innerHTML = '';
  for (var i = 0; i < state.teams.length; i++) {
    var col = document.createElement('div'); col.className = 'score-col' + (i === activeTeam ? ' active-team' : '');
    var mh = state.teamMembers[i] && state.teamMembers[i].length ? '<div class="score-members">' + state.teamMembers[i].join(', ') + '</div>' : '';
    col.innerHTML = '<div class="score-name">' + state.teams[i] + '</div>' + mh + '<div class="score-val">' + state.scores[i] + '</div>';
    el.appendChild(col);
  }
}
function shuffle(arr){ for (var i = arr.length-1; i > 0; i--) { var j = Math.floor(Math.random()*(i+1)), t = arr[i]; arr[i] = arr[j]; arr[j] = t; } return arr; }
function showScreen(id){ document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); }); document.getElementById('screen-'+id).classList.add('active'); }

function startGame(words) {
  state.words = shuffle(words.slice()); state.used = []; state.teams = []; state.teamMembers = [];
  for (var i = 0; i < selectedTeamCount; i++) {
    state.teams.push(getTeamName(i));
    state.teamMembers.push(assignedTeamMembers[i] ? assignedTeamMembers[i].slice() : []);
  }
  state.scores = state.teams.map(function(){ return 0; });
  state.roundTime = parseInt(document.getElementById('round-time').value) || 60;
  state.totalTime = state.roundTime;
  state.skipPenalty = parseInt(document.getElementById('skip-penalty').value);
  state.currentTeam = 0;
  showTurnStart();
}

function showTurnStart() {
  var t = state.currentTeam;
  document.getElementById('turn-team-name').textContent = state.teams[t];
  var m = state.teamMembers[t]; document.getElementById('turn-members').textContent = m && m.length ? m.join(' · ') : '';
  renderScoreboard('sb-turnstart', t);
  broadcast('turn-start');
  showScreen('turn-start');
}
function startRound() {
  state.roundCorrect = []; state.roundSkipped = []; state.timeLeft = state.roundTime;
  document.getElementById('round-log').innerHTML = '';
  updateTimerDisplay(); showScreen('playing'); nextWord();
  state.timer = setInterval(tick, 1000);
}
function tick() { state.timeLeft--; updateTimerDisplay(); broadcast('playing'); if (state.timeLeft <= 0) endRound(); }
function updateTimerDisplay() {
  var el = document.getElementById('timer-display'), bar = document.getElementById('timer-bar'), low = state.timeLeft <= 10;
  el.textContent = state.timeLeft; el.className = 'timer-num' + (low ? ' low' : '');
  bar.style.width = Math.max(0, state.timeLeft / state.totalTime * 100) + '%';
  bar.className = 'timer-bar' + (low ? ' low' : '');
}
function nextWord() {
  var av = state.words.filter(function(w){ return state.used.indexOf(w) === -1; });
  document.getElementById('words-left-count').textContent = av.length + ' מילים נותרו';
  if (av.length === 0) { endRound(); return; }
  state.currentWord = av[Math.floor(Math.random() * av.length)];
  state.used.push(state.currentWord);
  document.getElementById('current-word').textContent = state.currentWord;
  broadcast('playing');
}
function markCorrect() { if (!state.currentWord) return; state.roundCorrect.push(state.currentWord); addLog(state.currentWord, 'correct'); nextWord(); }
function skipWord()    { if (!state.currentWord) return; state.roundSkipped.push(state.currentWord); addLog(state.currentWord, 'skip'); nextWord(); }
function addLog(word, type) {
  var div = document.createElement('div'); div.className = 'log-item ' + type;
  div.innerHTML = '<span>' + word + '</span><span class="log-tag">' + (type==='correct' ? '✓ ניחשו' : '⟶ דלג') + '</span>';
  document.getElementById('round-log').prepend(div);
}
function endRound() {
  clearInterval(state.timer); state.timer = null;
  var pts = state.roundCorrect.length + state.roundSkipped.length * state.skipPenalty;
  state.scores[state.currentTeam] += pts;
  document.getElementById('turn-pts').textContent = '+' + pts + ' נקודות';
  document.getElementById('turn-sub').textContent = state.teams[state.currentTeam] + ' — ניחשו ' + state.roundCorrect.length + (state.roundSkipped.length ? ', דילגו ' + state.roundSkipped.length : '');
  document.getElementById('turn-list').innerHTML =
    state.roundCorrect.map(function(w){ return '<div class="summary-row"><span>'+w+'</span><span style="color:rgba(255,255,255,0.6);">✓</span></div>'; }).join('') +
    state.roundSkipped.map(function(w){ return '<div class="summary-row"><span style="opacity:0.6;">'+w+'</span><span style="color:rgba(255,255,255,0.4);">—</span></div>'; }).join('');
  renderScoreboard('sb-turnend', state.currentTeam);
  var wl = state.words.filter(function(w){ return state.used.indexOf(w) === -1; }).length;
  var btn = document.getElementById('next-turn-btn');
  if (wl === 0) { btn.textContent = '🏁 סיים משחק'; btn.onclick = showEndGame; }
  else          { btn.textContent = 'תור הבא ▶';    btn.onclick = nextTurn; }
  broadcast('turn-end');
  showScreen('turn-end');
}
function nextTurn() { state.currentTeam = (state.currentTeam + 1) % state.teams.length; showTurnStart(); }
function showEndGame() {
  var mx = Math.max.apply(null, state.scores);
  var sorted = state.teams.map(function(name,i){ return {name:name,score:state.scores[i],members:state.teamMembers[i]}; }).sort(function(a,b){ return b.score-a.score; });
  var ws = sorted.filter(function(t){ return t.score===mx; });
  document.getElementById('winner-name').textContent = ws.length===1 ? ws[0].name+' ניצחו!' : 'תיקו!';
  document.getElementById('winner-sub').textContent = mx + ' נקודות';
  document.getElementById('end-scores').innerHTML = sorted.map(function(t){
    var iw = t.score===mx, mh = t.members&&t.members.length ? '<div class="end-members">'+t.members.join(', ')+'</div>' : '';
    return '<div class="end-score-row'+(iw?' winner':'')+'"><div><div>'+(iw?'🏆 ':'')+t.name+'</div>'+mh+'</div><div>'+t.score+' נקודות</div></div>';
  }).join('');
  broadcast('end');
  showScreen('end');
}
function resetGame() {
  blobId = null; playersUrl = '';
  participants = []; assignedTeamMembers = [];
  document.getElementById('participants-list').innerHTML = '';
  document.getElementById('teams-reveal').innerHTML = '';
  document.getElementById('shuffle-btn').style.display = 'none';
  document.getElementById('room-bar').classList.remove('visible');
  showScreen('setup');
}

setTeamCount(3);
</script>
</body>
